# Bikeshare Model - CI/CD Pipeline with Cloud Build
# Updated: Uses Artifact Registry, Python 3.12, current gcloud commands
#
# Pipeline Steps:
#   1. Build Docker image
#   2. Push to Artifact Registry
#   3. Run automated tests
#   4. Submit Vertex AI training job
#   5. Upload model to Model Registry
#   6. Fetch model ID
#   7. Create Vertex AI endpoint
#   8. Deploy model to endpoint

substitutions:
  _REGION: us-central1
  _REPO_NAME: vertex-ai-models
  _IMAGE_NAME: cicd-vertex-bikeshare-model
  _ARTIFACT_URI: gs://YOUR_BUCKET_NAME/bike-share-rf-regression-artifact/

steps:
  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Build Docker Image'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/${_IMAGE_NAME}'
      - '.'

  # Step 2: Push image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Push Docker Image To Artifact Registry'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/${_IMAGE_NAME}'

  # Step 3: Run automated tests
  - name: '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/${_IMAGE_NAME}'
    id: 'Execute Tests'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        cd /app && pytest test-training.py -v

  # Step 4: Submit custom training job to Vertex AI
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'Submit Training Job'
    args:
      - 'ai'
      - 'custom-jobs'
      - 'create'
      - '--region=${_REGION}'
      - '--project=${PROJECT_ID}'
      - '--worker-pool-spec=replica-count=1,machine-type=n1-standard-4,container-image-uri=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/${_IMAGE_NAME}'
      - '--display-name=bike-sharing-model-training'

  # Step 5: Upload trained model to Vertex AI Model Registry
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'Upload Model'
    args:
      - 'ai'
      - 'models'
      - 'upload'
      - '--container-image-uri=us-docker.pkg.dev/vertex-ai/prediction/sklearn-cpu.1-5:latest'
      - '--description=bikeshare-model-cicd'
      - '--display-name=bikeshare-model-cicd'
      - '--artifact-uri=${_ARTIFACT_URI}'
      - '--project=${PROJECT_ID}'
      - '--region=${_REGION}'

  # Step 6: Fetch the latest model ID
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'Fetch Model ID'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud ai models list \
          --region=${_REGION} \
          --project=${PROJECT_ID} \
          --format="get(MODEL_ID)" \
          --sort-by="createTime" \
          --limit=1 > /workspace/model_id.txt

  # Step 7: Create a Vertex AI endpoint
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'Create Endpoint'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud ai endpoints create \
          --display-name=bikeshare-model-endpoint-cicd \
          --format="get(name)" \
          --region=${_REGION} \
          --project=${PROJECT_ID} > /workspace/endpoint_id.txt

  # Step 8: Deploy model to endpoint
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'Deploy Model To Endpoint'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud ai endpoints deploy-model $(cat /workspace/endpoint_id.txt) \
          --region=${_REGION} \
          --project=${PROJECT_ID} \
          --model=$(cat /workspace/model_id.txt) \
          --display-name=bikeshare-model-endpoint \
          --traffic-split=0=100 \
          --machine-type=n1-standard-4

options:
  logging: CLOUD_LOGGING_ONLY
